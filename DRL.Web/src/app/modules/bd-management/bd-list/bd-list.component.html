<div>
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a [routerLink]='["/users"]'>Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">BDs</li>
    </ol>
  </nav>

  <div class="top-title-bar">
    <h2 class="page-title">BDs</h2>
    <div class="filter-role">
      <a href="#" [routerLink]='["/bd/create"]' class="btn btn-defult site-btn" (click)="addNewBD()">
        <i class="fa fa-plus"></i> BD
      </a>
    </div>
  </div>

  <div class="white-box">
    <div class="table-responsive" style="width:100%">
      <div class="mat-elevation-z8">
        <kendo-grid [kendoGridBinding]="gridView.data" [filterable]="true" [pageSize]="state.take" [skip]="state.skip"
          [sortable]="true" [columnMenu]="false" [sort]="state.sort" (dataStateChange)="dataStateChange($event)"
          [pageable]="true">

          <kendo-grid-messages noRecords="{{_appConstantService.noRecordsMessage}}"></kendo-grid-messages>

          <kendo-grid-column field="bdName" title="BD Name" width="40%">
          </kendo-grid-column>

          <kendo-grid-column field="approver" title="Approver" width="25%" filter="boolean">
            <ng-template kendoGridCellTemplate let-dataItem>
              {{ dataItem.approver ? 'Yes' : 'No' }}
            </ng-template>
          </kendo-grid-column>

          <kendo-grid-column field="isActive" title="Status" width="20%" filter="boolean">
            <ng-template kendoGridFilterCellTemplate let-filter>
              <div>
                <kendo-dropdownlist [data]="_appConstantService.listItems" textField="text" valueField="value"
                  class="custom-dropdown" [(ngModel)]="_appConstantService.selectedValue" [valuePrimitive]="true"
                  (selectionChange)="activeInactiveFilterChange($event)">
                </kendo-dropdownlist>
              </div>
            </ng-template>
            <ng-template kendoGridCellTemplate let-dataItem>
              <div class="btn-style">
                <input type="button"
                  class="{{(dataItem.isActive == true || dataItem.isActive == 1) ? 'btn btn-default btnStatus btn-active' : 'btn btn-default btnStatus btn-inactive'}}"
                  value="{{(dataItem.isActive == true || dataItem.isActive == 1) ? 'Active' : 'Inactive'}}"
                  (click)="toggleBDStatus(dataItem)">
              </div>
            </ng-template>
          </kendo-grid-column>

          <kendo-grid-command-column title="Actions" width="15%">
            <ng-template kendoGridCellTemplate kendoTooltip let-dataItem>
              <li kendoGridEditCommand title="Edit BD" (click)="editBD(dataItem.bdid)" class="pencil">
                <i class="fa fa-pencil" aria-hidden="true"></i>
              </li>
            </ng-template>
          </kendo-grid-command-column>

        </kendo-grid>
      </div>
    </div>
  </div>
</div>
