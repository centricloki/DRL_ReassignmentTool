<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">{{ pageTitle }}</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="zoneForm" (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label for="zoneName">Zone Name *</label>
                  <input type="text" class="form-control" id="zoneName" formControlName="zoneName"
                    [class.is-invalid]="f.zoneName.invalid && f.zoneName.touched">
                  <div *ngIf="f.zoneName.invalid && f.zoneName.touched" class="invalid-feedback">
                    <div *ngIf="f.zoneName.errors && f.zoneName.errors['required']">Zone name is required</div>
                    <div *ngIf="f.zoneName.errors && f.zoneName.errors['maxlength']">Zone name must be less than 100 characters</div>
                  </div>
                </div>
              </div>
              
              <div class="col-md-6">
                <div class="form-group">
                  <label for="isActive">Status</label>
                  <select class="form-control" id="isActive" formControlName="isActive">
                    <option [value]="true">Active</option>
                    <option [value]="false">Inactive</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label for="avpid">AVP ID</label>
                  <input type="number" class="form-control" id="avpid" formControlName="avpid"
                    placeholder="Enter AVP ID (optional)">
                </div>
              </div>
            </div>

            <div class="form-group text-right">
              <button type="button" class="btn btn-secondary mr-2" (click)="goBack()">Cancel</button>
              <button type="submit" class="btn btn-primary" [disabled]="zoneForm.invalid">
                <i class="fa fa-save"></i> Save Zone
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
