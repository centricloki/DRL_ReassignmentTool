<div>
  <!-- Breadcrumb Navigation -->
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a [routerLink]='["/users"]'>Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Zones</li>
    </ol>
  </nav>

  <!-- Title Bar with Add Button -->
  <div class="top-title-bar">
    <h2 class="page-title">Zones</h2>
    <div class="filter-role">
      <a href="#" [routerLink]='["/zone-management/create"]' class="btn btn-defult site-btn" (click)="addNewZone()">
        <i class="fa fa-plus"></i> Zone
      </a>
    </div>
  </div>

  <!-- White Box Container with Kendo Grid -->
  <div class="white-box">
    <div class="table-responsive" style="width:100%">
      <div class="mat-elevation-z8">
        <kendo-grid [kendoGridBinding]="gridView.data"
                    [filterable]="true"
                    [pageSize]="state.take"
                    [skip]="state.skip"
                    [sortable]="true"
                    [columnMenu]="false"
                    [sort]="state.sort"
                    (dataStateChange)="dataStateChange($event)"
                    [pageable]="true">

          <kendo-grid-messages noRecords="{{_appConstantService.noRecordsMessage}}"></kendo-grid-messages>

          <!-- ✅ Zone Name Column -->
          <kendo-grid-column field="zoneName" title="Zone Name" width="35%">
          </kendo-grid-column>

          <!-- ✅ AVP Column -->
          <kendo-grid-column field="avpName" title="AVP" width="30%">
            <ng-template kendoGridCellTemplate let-dataItem>
              {{ dataItem.avpName || '-' }}
            </ng-template>
          </kendo-grid-column>

          <!-- ✅ Status Column with Toggle -->
          <kendo-grid-column field="isActive" title="Status" width="20%" filter="boolean">
            <ng-template kendoGridFilterCellTemplate let-filter>
              <div>
                <kendo-dropdownlist [data]="_appConstantService.listItems"
                                    textField="text"
                                    valueField="value"
                                    class="custom-dropdown"
                                    [(ngModel)]=" _appConstantService.selectedValue"
                                    [valuePrimitive]="true"
                                    (selectionChange)="activeInactiveFilterChange($event)">
                </kendo-dropdownlist>
              </div>
            </ng-template>
            <ng-template kendoGridCellTemplate let-dataItem>
              <div class="btn-style">
                <input type="button"
                       class="{{(dataItem.isActive == true || dataItem.isActive == 1) ? 'btn btn-default btnStatus btn-active' : 'btn btn-default btnStatus btn-inactive'}}"
                       value="{{(dataItem.isActive == true || dataItem.isActive == 1) ? 'Active' : 'Inactive'}}"
                       (click)="toggleZoneStatus(dataItem)">
              </div>
            </ng-template>
          </kendo-grid-column>

          <!-- ✅ Actions Column -->
          <kendo-grid-command-column title="Actions" width="15%">
            <ng-template kendoGridCellTemplate kendoTooltip let-dataItem>
              <li kendoGridEditCommand title="Edit Zone" (click)="editZone(dataItem.zoneId)" class="pencil">
                <i class="fa fa-pencil" aria-hidden="true"></i>
              </li>
              <!-- <li kendoGridEditCommand title="Delete Zone" (click)="deleteZone(dataItem)" class="trash">
                <i class="fa fa-trash" aria-hidden="true"></i>
              </li> -->
            </ng-template>
          </kendo-grid-command-column>

        </kendo-grid>
      </div>
    </div>
  </div>
</div>
